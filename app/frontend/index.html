<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiSafe Sentinel | Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.7);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --success: #10b981;
            --error: #f43f5e;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --terminal-bg: rgba(0, 0, 0, 0.6);
        }

        /* LIGHT MODE OVERRIDES */
        body.light-mode {
            --bg: #f1f5f9;
            --card: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.1);
            --text-main: #1e293b;
            --terminal-bg: #1e293b;
            background-image: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.1) 0%, transparent 40%);
        }

        * { box-sizing: border-box; transition: background 0.4s, color 0.4s, border 0.4s; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }

        .brand { font-weight: 800; font-size: 1.3rem; letter-spacing: 1px; color: var(--text-main); display: flex; align-items: center; gap: 12px; }
        .brand span { color: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.2rem; padding: 1.5rem 2.5rem; }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 1.2rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .toggle-area { cursor: pointer; border: 2px dashed var(--accent); border-radius: 12px; transition: 0.2s; }
        .toggle-area:hover { background: rgba(56, 189, 248, 0.1); }

        .stat-icon { background: rgba(255, 255, 255, 0.03); padding: 10px; border-radius: 12px; display: flex; color: var(--accent); }
        .stat-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
        .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--text-main); display: block; }
        .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }

        main { flex: 1; display: grid; grid-template-columns: 340px 1fr; gap: 1.5rem; padding: 0 2.5rem 1.5rem 2.5rem; overflow: hidden; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(15px); }

        .controls { padding: 1.5rem; display: flex; flex-direction: column; gap: 12px; }
        .btn-small {
            display: flex; align-items: center; gap: 10px; padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            border-radius: 12px; color: #94a3b8; cursor: pointer; font-weight: 600;
            text-align: left; width: 100%;
        }
        .btn-small:hover { background: rgba(255, 255, 255, 0.08); color: var(--accent); border-color: var(--accent); }

        .btn-sync-container { margin-top: auto; padding: 1.5rem; border-top: 1px solid var(--border); }
        .btn-sync {
            width: 100%; height: 60px; background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: white; border: none; border-radius: 14px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }
        .btn-sync.active { background: #000; border: 2px solid var(--error); color: var(--error); animation: pulse-border 2s infinite; }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }

        .terminal { background: var(--terminal-bg); position: relative; }
        #log-feed { flex: 1; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 11px; overflow-y: auto; color: #94a3b8; }
        .log-line { margin-bottom: 6px; display: flex; gap: 12px; border-left: 2px solid #1e293b; padding-left: 12px; }
        
        .ping {
            position: absolute; width: 10px; height: 10px; background: var(--accent);
            border-radius: 50%; pointer-events: none; animation: ping-expand 0.6s ease-out forwards;
        }
        @keyframes ping-expand {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(10); opacity: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        LOGISAFE <span>SENTINEL</span>
    </div>
    <div style="font-size: 0.75rem; font-weight: 600;">Handshake: <span id="status-text" style="color:var(--success)">ENCRYPTED</span></div>
</header>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
        <div><span class="stat-label">Requests</span><span class="stat-value" id="stat-req">0</span></div>
    </div>
    <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <div><span class="stat-label">Stability</span><span class="stat-value" id="stat-health">100%</span></div>
    </div>
    <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
        <div><span class="stat-label">Latency</span><span class="stat-value" id="stat-latency">0ms</span></div>
    </div>
    
    <div class="stat-card toggle-area" onclick="toggleTheme()">
        <div class="stat-icon" id="theme-icon">
            <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </div>
        <div>
            <span class="stat-label">Cluster Mode</span>
            <span class="stat-value" id="mode-text">Dark</span>
        </div>
    </div>
</div>

<main>
    <div class="panel">
        <div class="controls">
            <button class="btn-small" onclick="callAPI('/')">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Home Node
            </button>
            <button class="btn-small" onclick="callAPI('/health')">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Diagnostic
            </button>
            <button class="btn-small" onclick="callAPI('/simulate')">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Log Injection
            </button>

            <button class="btn-small" onclick="downloadAuditLog()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/></svg> Export Audit Trail
            </button>

            <button class="btn-small" style="color: var(--error); border-color: rgba(244, 63, 94, 0.2);" onclick="clearAuditLog()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></svg> Purge Audit Log
            </button>
        </div>

        <div class="btn-sync-container">
            <button id="streamBtn" class="btn-sync" onclick="toggleStream()">
                <svg id="sync-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                <span id="btn-text">Establish Live Sync</span>
            </button>
        </div>
    </div>

    <div class="panel terminal" id="terminal-window">
        <div style="background: rgba(15, 23, 42, 0.9); padding: 8px 20px; font-size: 10px; color: #64748b; display: flex; justify-content: space-between;">
            <span>OVERWATCH_OS // LIVE_FEED</span>
            <span id="sync-indicator">READY</span>
        </div>
        <div id="log-feed"></div>
    </div>
</main>

<script>
    const BASE_URL = "";
    let streamInterval = null;
    let reqCount = 0;

    function toggleTheme() {
        const isDark = document.body.classList.toggle('light-mode');
        const modeText = document.getElementById('mode-text');
        const themeIcon = document.getElementById('theme-icon');
        
        if (document.body.classList.contains('light-mode')) {
            modeText.innerText = "Light";
            themeIcon.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
        } else {
            modeText.innerText = "Dark";
            themeIcon.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
        }
    }

    function createPing() {
        const ping = document.createElement('div');
        ping.className = 'ping';
        ping.style.left = Math.random() * 80 + 10 + '%';
        ping.style.top = Math.random() * 80 + 10 + '%';
        document.body.appendChild(ping);
        setTimeout(() => ping.remove(), 600);
    }

    async function callAPI(endpoint) {
        const start = Date.now();
        try {
            const res = await fetch(BASE_URL + endpoint);
            const data = await res.json();
            reqCount++;
            createPing();
            document.getElementById('stat-req').innerText = reqCount;
            document.getElementById('stat-latency').innerText = (Date.now() - start) + 'ms';
            
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span style="color:var(--accent)">[${new Date().toLocaleTimeString()}]</span> <span>REQ: ${endpoint} -> SUCCESS</span>`;
            const feed = document.getElementById('log-feed');
            feed.appendChild(line);
            feed.scrollTop = feed.scrollHeight;
        } catch (e) {
            document.getElementById('stat-health').innerText = "ERR";
        }
    }

    function downloadAuditLog() {
        window.location.href = '/download-logs';
        const line = document.createElement('div');
        line.className = 'log-line';
        line.innerHTML = `<span style="color:var(--success)">[SYSTEM]</span> <span>LOG EXPORT INITIATED</span>`;
        document.getElementById('log-feed').appendChild(line);
    }

    async function clearAuditLog() {
        if(!confirm("Are you sure you want to wipe the security audit trail?")) return;
        
        try {
            const res = await fetch('/clear-logs', { method: 'POST' });
            const data = await res.json();
            
            const line = document.createElement('div');
            line.className = 'log-line';
            line.style.color = 'var(--error)';
            line.innerHTML = `<span style="color:var(--error)">[SYSTEM]</span> <span style="font-weight:bold">${data.message.toUpperCase()}</span>`;
            const feed = document.getElementById('log-feed');
            feed.appendChild(line);
            feed.scrollTop = feed.scrollHeight;
        } catch (e) {
            console.error("Failed to clear logs", e);
        }
    }

    function toggleStream() {
        const btn = document.getElementById('streamBtn');
        if (streamInterval) {
            clearInterval(streamInterval);
            streamInterval = null;
            btn.classList.remove('active');
            document.getElementById('btn-text').innerText = "Establish Live Sync";
        } else {
            btn.classList.add('active');
            document.getElementById('btn-text').innerText = "Terminate Stream";
            streamInterval = setInterval(() => callAPI('/health'), 2000);
        }
    }
</script>

</body>
</html>
