<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiSafe Sentinel | Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617; --card: rgba(15, 23, 42, 0.7); --accent: #38bdf8;
            --success: #10b981; --error: #f43f5e; --border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0; --terminal-bg: rgba(0, 0, 0, 0.6);
        }
        body.light-mode {
            --bg: #f1f5f9; --card: rgba(255, 255, 255, 0.8); --border: rgba(0, 0, 0, 0.1);
            --text-main: #1e293b; --terminal-bg: #1e293b;
        }
        * { box-sizing: border-box; transition: 0.3s; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg);
            color: var(--text-main); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        header { padding: 1.2rem 2.5rem; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); }
        .brand { font-weight: 800; font-size: 1.3rem; display: flex; align-items: center; gap: 12px; }
        .brand span { color: var(--accent); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.2rem; padding: 1.5rem 2.5rem; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 1.2rem; border-radius: 16px; display: flex; align-items: center; gap: 15px; }
        .stat-icon { color: var(--accent); display: flex; align-items: center; }
        .stat-icon svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; }
        
        .stat-value { font-size: 1.4rem; font-weight: 700; display: block; }
        .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; font-weight: 700; }
        
        main { flex: 1; display: grid; grid-template-columns: 340px 1fr; gap: 1.5rem; padding: 0 2.5rem 1.5rem; overflow: hidden; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        
        .controls { padding: 1.5rem; display: flex; flex-direction: column; gap: 12px; }
        .btn-small {
            display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border); border-radius: 12px; color: #94a3b8; cursor: pointer; font-weight: 600;
        }
        .btn-small svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
        .btn-small:hover { border-color: var(--accent); color: var(--accent); background: rgba(56, 189, 248, 0.05); }
        
        .btn-sync-container { margin-top: auto; padding: 1.5rem; border-top: 1px solid var(--border); }
        .btn-sync {
            width: 100%; height: 50px; background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-sync svg { width: 20px; height: 20px; fill: currentColor; }
        .btn-sync.active { background: #000; border: 2px solid var(--error); color: var(--error); }
        
        .terminal { background: var(--terminal-bg); flex: 1; overflow-y: auto; padding: 20px; font-family: 'JetBrains Mono'; font-size: 11px; }
        .log-line { margin-bottom: 6px; border-left: 2px solid #1e293b; padding-left: 10px; }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        LOGISAFE <span>SENTINEL</span>
    </div>
    <div style="font-size: 0.75rem;">Status: <span id="status-text" style="color:var(--success)">ENCRYPTED</span></div>
</header>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg></div>
        <div><span class="stat-label">Requests</span><span class="stat-value" id="stat-req">0</span></div>
    </div>
    <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></div>
        <div><span class="stat-label">Engine Health</span><span class="stat-value" id="stat-health">100%</span></div>
    </div>
    <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>
        <div><span class="stat-label">Latency</span><span class="stat-value" id="stat-latency">0ms</span></div>
    </div>
    <div class="stat-card" style="cursor:pointer" onclick="document.body.classList.toggle('light-mode')">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></div>
        <div><span class="stat-label">UI Mode</span><span class="stat-value">Toggle</span></div>
    </div>
</div>

<main>
    <div class="panel">
        <div class="controls">
            <button class="btn-small" onclick="callAPI('/health')">
                <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                Diagnostic Check
            </button>
            <button class="btn-small" onclick="callAPI('/simulate')">
                <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                Log Injection
            </button>
            <button class="btn-small" onclick="window.location.href='/download-logs'">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Export Audit Trail
            </button>
            <button class="btn-small" style="color:var(--error)" onclick="clearAuditLog()">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                Purge Audit Log
            </button>
        </div>
        <div class="btn-sync-container">
            <button id="streamBtn" class="btn-sync" onclick="toggleStream()">
                <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <span id="btn-text">Establish Live Sync</span>
            </button>
        </div>
    </div>
    <div class="panel" style="position:relative">
        <div style="background:rgba(0,0,0,0.3); padding:5px 20px; font-size:9px">LIVE_AUDIT_FEED</div>
        <div id="log-feed" class="terminal"></div>
    </div>
</main>

<script>
    let streamInterval = null;
    let reqCount = 0;

    async function callAPI(endpoint) {
        const start = Date.now();
        try {
            const res = await fetch(endpoint);
            const data = await res.json();
            
            document.getElementById('stat-latency').innerText = (Date.now() - start) + 'ms';
            reqCount++;
            document.getElementById('stat-req').innerText = reqCount;

            const line = document.createElement('div');
            line.className = 'log-line';
            
            if (res.status === 429) {
                document.getElementById('stat-health').innerText = "ALERT";
                document.getElementById('stat-health').style.color = "var(--error)";
                line.style.color = 'var(--error)';
                line.innerHTML = `<span>[CRITICAL]</span> <span>${data.incident.toUpperCase()}</span>`;
            } else {
                document.getElementById('stat-health').innerText = "100%";
                document.getElementById('stat-health').style.color = "var(--success)";
                line.innerHTML = `<span>[${new Date().toLocaleTimeString()}]</span> <span>REQ: ${endpoint} -> SUCCESS</span>`;
            }

            const feed = document.getElementById('log-feed');
            feed.appendChild(line);
            feed.scrollTop = feed.scrollHeight;
        } catch (e) {
            document.getElementById('stat-health').innerText = "OFFLINE";
        }
    }

    async function clearAuditLog() {
        if(!confirm("Wipe all logs?")) return;
        await fetch('/clear-logs', { method: 'POST' });
        document.getElementById('log-feed').innerHTML = '<div class="log-line" style="color:var(--error)">[SYSTEM] AUDIT TRAIL PURGED</div>';
    }

    function toggleStream() {
        const btn = document.getElementById('streamBtn');
        const btnText = document.getElementById('btn-text');
        if (streamInterval) {
            clearInterval(streamInterval);
            streamInterval = null;
            btnText.innerText = "Establish Live Sync";
            btn.classList.remove('active');
        } else {
            btnText.innerText = "Terminate Stream";
            btn.classList.add('active');
            streamInterval = setInterval(() => callAPI('/health'), 2000);
        }
    }
</script>
</body>
</html>
